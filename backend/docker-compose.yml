# Docker Compose for Ganesh Kulfi Backend
# 
# USAGE: Copy .env.example to .env and fill in your secrets before running.
#   cp .env.example .env
#   docker compose up -d

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ganeshkulfi-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ganeshkulfi_db}
      POSTGRES_USER: ${POSTGRES_USER:-ganeshkulfi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ganeshkulfi_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ganeshkulfi-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ganeshkulfi_db}
      DB_USER: ${POSTGRES_USER:-ganeshkulfi_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_POOL_SIZE: 10
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_ISSUER: ${JWT_ISSUER:-ganeshkulfi}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ganeshkulfi-app}
      APP_PORT: 8080
      UPLOADS_DIR: uploads
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
