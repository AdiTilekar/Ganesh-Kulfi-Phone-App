services:
  # Backend Web Service
  - type: web
    name: ganesh-kulfi-backend
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ganesh-kulfi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: ganeshkulfi
      - key: JWT_AUDIENCE
        value: ganeshkulfi-app

databases:
  # PostgreSQL Database
  - name: ganesh-kulfi-db
    plan: free
    databaseName: ganeshkulfi
    user: ganeshkulfi
